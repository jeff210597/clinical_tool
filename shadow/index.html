<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>影子查房工作站</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <header>
          <p class="eyebrow">Shadow Workstation</p>
          <h1>影子查房工作站</h1>
          <p id="status">等待 PIN</p>
        </header>

        <section class="card">
          <label for="pin">存取 PIN</label>
          <div class="row">
            <input id="pin" type="password" autocomplete="current-password" placeholder="輸入 PIN" />
            <button id="savePin" type="button">儲存</button>
          </div>
        </section>

        <section class="card">
          <label for="doctorId">醫師住院清單</label>
          <div class="row">
            <input id="doctorId" inputmode="numeric" placeholder="例如 09432" />
            <button id="loadWard" type="button">查詢</button>
          </div>
        </section>

        <section class="card">
          <label for="patientQuery">病人摘要</label>
          <div class="row">
            <input id="patientQuery" placeholder="病歷號 / 床號" />
            <button id="loadSummary" type="button">查詢</button>
          </div>
        </section>

        <section class="card roster-card">
          <div class="section-title">
            <span>病人清單</span>
            <button id="clearPatients" class="small" type="button">清空</button>
          </div>
          <div id="roster" class="patient-list"><div class="empty">尚未查詢。</div></div>
        </section>
      </aside>

      <main class="content">
        <header class="patient-header">
          <div>
            <p class="eyebrow">目前病人</p>
            <h2 id="patientTitle">尚未選擇</h2>
            <p id="patientMeta">先輸入 PIN，再查醫師清單或病人摘要。</p>
          </div>
          <button id="refreshPatient" type="button" disabled>重新整理</button>
        </header>
        <nav id="patientTabs" class="patient-tabs" aria-label="已開啟病人"></nav>
        <nav id="dataTabs" class="tabs" aria-label="資料分頁">
          <button class="tab is-active" data-tab="summary" type="button">摘要</button>
          <button class="tab" data-tab="tpr" type="button">TPR</button>
          <button class="tab" data-tab="labs" type="button">Labs</button>
          <button class="tab" data-tab="io" type="button">輸入輸出</button>
          <button class="tab" data-tab="imaging" type="button">影像</button>
          <button class="tab" data-tab="surgery" type="button">手術</button>
          <button class="tab" data-tab="pathology" type="button">病理</button>
          <button class="tab" data-tab="orders" type="button">醫囑</button>
          <button class="tab" data-tab="nursing" type="button">護理</button>
          <button class="tab" data-tab="glucose" type="button">血糖</button>
          <button class="tab" data-tab="ai" type="button">AI 判讀</button>
        </nav>
        <section id="resultPanel" class="panel">
          <div class="empty">先輸入 PIN，再查醫師清單或病人摘要。</div>
        </section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
