<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>影子查房工作台</title>
    <link rel="stylesheet" href="/styles.css?v=shadow-relay-control-1" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="病人清單">
        <div class="brand"><div><h1>查房工作台</h1><p id="serviceStatus">影子工作站檢查中</p></div></div>
        <section class="auth-panel">
          <form id="loginForm" class="login-form">
            <label for="loginUser">影子工作站 PIN</label>
            <input id="loginUser" name="loginUser" type="password" autocomplete="current-password" placeholder="輸入 PIN" />
            <input id="loginPassword" name="loginPassword" type="hidden" />
            <button type="submit">解鎖影子工作站</button>
            <p id="loginMessage" class="eyebrow">PIN 只用於讀取 Discord 中轉資料，不連線院內網路。</p>
          </form>
          <div id="userPanel" class="user-panel is-hidden"><span id="currentUserLabel"></span><button id="logoutButton" type="button">清除 PIN</button></div>
        </section>
        <form id="searchForm" class="search"><label for="patientQuery">病歷號 / 床號 / 住院序號</label><div class="search-row"><input id="patientQuery" name="patientQuery" autocomplete="off" placeholder="輸入病歷號或床號" /><button type="submit">查詢</button></div></form>
        <section class="roster-panel">
          <form id="physicianRosterForm" class="search">
            <label for="physicianQuery">醫師住院清單</label>
            <div class="search-row"><input id="physicianQuery" name="physicianQuery" autocomplete="off" placeholder="醫師員工編號，如 09432" /><button type="submit">住院</button></div>
          </form>
          <div id="physicianRosterStatus" class="eyebrow">輸入醫師員工編號後，透過影子 relay 快速列出住院病人。</div>
          <div class="roster-actions"><button id="openRosterPatients" type="button" disabled>開啟全部病人</button><button id="refreshRosterPatients" type="button" disabled>更新全部摘要</button></div>
          <div id="physicianRosterList" class="patient-list roster-list"></div>
        </section>
        <section><div class="section-title"><span>最近擷取</span><button id="reloadRecent" class="icon-button" type="button" title="重新整理最近擷取清單">↻</button></div><p id="recentStatus" class="eyebrow">重整只更新左側清單。</p><div id="recentList" class="patient-list"></div></section>
      </aside>
      <main class="content">
        <header class="patient-header"><div><p class="eyebrow">目前病人</p><h2 id="patientTitle">尚未選擇</h2><p id="patientMeta">請先輸入影子工作站 PIN 後再查詢。</p></div><div class="actions"><button id="disableShadowRelay" class="danger-action" type="button" disabled>停止影子連線</button><button id="refreshOnepage" type="button" disabled>重新連線 Onepage</button><button id="refreshPatient" type="button" disabled>重新整理</button><button id="copySummary" type="button" disabled>複製摘要</button></div></header>
        <div id="patientWindowTabs" class="patient-window-tabs" aria-label="已開啟病人"></div>
        <div id="warningStrip" class="warning-strip is-hidden"></div>
        <nav class="tabs" aria-label="資料分頁">
          <button class="tab is-active" data-tab="summary" type="button">摘要</button><button class="tab" data-tab="context" type="button">診斷病史</button><button class="tab" data-tab="orders" type="button">醫囑</button><button class="tab" data-tab="tpr" type="button">TPR</button><button class="tab" data-tab="labs" type="button">Labs</button><button class="tab" data-tab="imaging" type="button">影像</button><button class="tab" data-tab="surgery" type="button">手術</button><button class="tab" data-tab="pathology" type="button">病理</button><button class="tab" data-tab="io" type="button">輸入輸出</button><button class="tab" data-tab="nursing" type="button">護理</button><button class="tab" data-tab="glucose" type="button">血糖</button><button class="tab" data-tab="note" type="button">Note</button>
        </nav><section id="summaryPanel" class="panel" data-panel="summary"><div class="empty-state">請先輸入 PIN，再選擇病人。</div></section>
        <section id="contextPanel" class="panel is-hidden" data-panel="context"></section><section id="ordersPanel" class="panel is-hidden" data-panel="orders"></section><section id="tprPanel" class="panel is-hidden" data-panel="tpr"></section><section id="labsPanel" class="panel is-hidden" data-panel="labs"></section><section id="imagingPanel" class="panel is-hidden" data-panel="imaging"></section><section id="surgeryPanel" class="panel is-hidden" data-panel="surgery"></section><section id="pathologyPanel" class="panel is-hidden" data-panel="pathology"></section><section id="ioPanel" class="panel is-hidden" data-panel="io"></section><section id="nursingPanel" class="panel is-hidden" data-panel="nursing"></section><section id="glucosePanel" class="panel is-hidden" data-panel="glucose"></section><section id="notePanel" class="panel is-hidden" data-panel="note"></section></main>
    </div>
    <script src="/app.js?v=shadow-relay-control-1"></script>
  </body>
</html>
